<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streamline</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-dark">
  <div class="window-root">
    <header class="app-titlebar">
      <div class="titlebar-left-controls">
        <div class="settings-command-shell" id="settings-command-shell">
          <button class="icon-btn" id="settings-btn" title="Settings"><img src="../settings.svg" alt="Settings"></button>
          <button class="icon-btn" id="appids-btn" title="AppIDs"><img src="../update-appids.svg" alt="AppIDs"></button>
          <button class="icon-btn" id="command-palette-btn" type="button" title="Additional Actions"><img src="../chevron.svg" alt=""></button>
          <div id="commands-split-menu" class="commands-split-menu hidden">
            <button class="commands-split-item" id="open-command-palette-btn" type="button">
              <span class="commands-split-label">Command Palette</span>
              <span class="commands-split-hint">Ctrl+K / Shift Shift</span>
            </button>
          </div>
        </div>
      </div>
      <div class="titlebar-drag pywebview-drag-region"></div>
      <nav class="titlebar-tabs" aria-label="App sections">
        <button class="titlebar-tab" type="button" data-app-tab="browse">Browse</button>
        <button class="titlebar-tab active" type="button" data-app-tab="queue">Queue</button>
        <button class="titlebar-tab" type="button" data-app-tab="update">Update</button>
      </nav>
      <div class="titlebar-drag pywebview-drag-region"></div>
      <div class="titlebar-right-controls">
        <div class="titlebar-account-shell">
          <div class="account-select-wrap select-chevron-wrap">
            <select class="control account-select" id="account-select">
              <option>Anonymous</option>
            </select>
          </div>
          <button class="icon-btn" id="accounts-btn" title="Accounts"><img src="../accounts.svg" alt="Accounts"></button>
        </div>
      </div>
      <div class="import-export-spacer" aria-hidden="true"></div>
      <div class="titlebar-actions">
        <button class="titlebar-btn" id="minimize-btn" type="button" title="Minimize">
          <img src="../window-minimize.svg" alt="Minimize">
        </button>
        <button class="titlebar-btn close" id="close-btn" type="button" title="Close">
          <img src="../window-close.svg" alt="Close">
        </button>
      </div>
    </header>

    <div class="content">
      <section class="app-tab-panel browse-panel hidden" data-app-panel="browse">
        <form id="browse-form" class="input-row input-row-zoned browse-toolbar">
          <div class="input-row-zone input-row-zone-center">
            <div class="line-input-wrap">
              <button class="line-icon-btn" id="browse-home-btn" type="button" title="Open Steam Workshop">
                <img src="../info.svg" alt="Workshop">
              </button>
              <input class="control line-input" id="browse-url" name="browse-url" type="text" placeholder="Enter Workshop URL, AppID, or game name">
            </div>
          </div>
          <div class="input-row-zone input-row-zone-right">
            <button class="control action-btn" id="browse-open-btn" type="submit">Open</button>
            <button class="control action-btn" id="browse-translate-btn" type="button">Translate</button>
            <button class="control action-btn" id="browse-add-btn" type="button">Add</button>
          </div>
        </form>
        <div class="browse-status-line">
          <div class="browse-status-row" id="browse-status">Ready</div>
          <div class="browse-nav-controls">
            <button class="control browse-nav-btn" id="browse-back-btn" type="button" title="Back">&lt;</button>
            <button class="control browse-nav-btn" id="browse-forward-btn" type="button" title="Forward">&gt;</button>
          </div>
        </div>
        <div class="browse-translate-overlay hidden" id="browse-translate-overlay">
          <label class="browse-translate-label" for="browse-translate-language">Translate page to</label>
          <select class="control browse-translate-select" id="browse-translate-language">
            <option value="vi" selected>Vietnamese</option>
            <option value="en">English</option>
            <option value="zh-CN">Chinese Simplified</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="fr">French</option>
            <option value="de">German</option>
          </select>
          <button class="control browse-translate-action" id="browse-translate-apply-btn" type="button">Apply</button>
          <button class="control browse-translate-action" id="browse-translate-cancel-btn" type="button">Cancel</button>
        </div>
        <section class="browse-webview-wrap">
          <div id="browse-webview" class="browse-native-host">
            <span>Workshop browser is available in the Electron app.</span>
          </div>
        </section>
      </section>

      <section class="app-tab-panel active" data-app-panel="queue">
        <form id="queue-form" class="input-row input-row-zoned">
          <div class="input-row-zone input-row-zone-center">
            <div class="line-input-wrap">
              <button class="line-icon-btn" id="url-help-btn" type="button" title="Workshop Input Help">
                <img src="../info.svg" alt="Info">
              </button>
              <input class="control line-input" id="item-url" name="item-url" type="text" placeholder="Enter game name, AppID, Mod, Collection URL or ID" required>
            </div>
          </div>
          <div class="input-row-zone input-row-zone-right">
            <button class="control action-btn" id="download-now-btn" type="button">Download</button>
            <button class="control action-btn" id="add-to-queue-btn" type="submit">Add to Queue</button>
          </div>
        </form>

        <section id="search-row" class="search-row">
          <div class="line-input-wrap">
            <button class="line-icon-btn" id="filter-btn" type="button" title="Filter Queue Status">
              <img src="../filter-queue-status.svg" alt="Filter">
            </button>
            <input class="control line-input" id="search-input" type="text" placeholder="Mods in Queue: 0     /     Search by Mod ID or Name">
            <button class="tiny-icon-btn" id="case-btn" type="button" title="Case sensitivity">
              <img id="case-icon" src="../case-sensitive.svg" alt="Case">
            </button>
            <button class="tiny-icon-btn" id="regex-btn" type="button" title="Regex">
              <img id="regex-icon" src="../regex.svg" alt="Regex">
            </button>
            <div class="filter-popup hidden" id="filter-popup">
              <button class="filter-item active" data-filter="All">All Mods</button>
              <button class="filter-item" data-filter="Queued">Mods Queued</button>
              <button class="filter-item" data-filter="Downloaded">Downloaded</button>
              <button class="filter-item" data-filter="Failed">Failed</button>
            </div>
          </div>
          <div id="import-export-spacer" class="import-export-spacer"></div>
          <div id="import-export-wrap" class="import-export-wrap">
            <button class="icon-btn" id="import-btn" type="button" title="Import Queue"><img src="../import.svg" alt="Import"></button>
            <button class="icon-btn" id="export-btn" type="button" title="Export Queue"><img src="../export.svg" alt="Export"></button>
          </div>
        </section>

        <section class="queue-list-section mod-list-section is-hidden" id="mod-list-section">
          <button class="queue-list-toggle" id="mod-list-toggle" type="button" aria-expanded="true">
            <span class="queue-list-title">Mod List</span>
            <span class="queue-list-summary" id="mod-list-summary">Search an AppID to show workshop mods</span>
          </button>
          <div class="queue-list-body">
            <section class="queue-table-wrap mod-list-table-wrap">
              <table id="mod-list-table">
                <thead>
                  <tr>
                    <th>Game</th>
                    <th>Mod ID</th>
                    <th>Mod Name</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="mod-list-body">
                  <tr>
                    <td colspan="4" class="empty-cell">Search by AppID or game Workshop link to list mods.</td>
                  </tr>
                </tbody>
              </table>
            </section>
          </div>
        </section>

        <section class="queue-list-section expanded" id="queue-list-section">
          <button class="queue-list-toggle" id="queue-list-toggle" type="button" aria-expanded="true">
            <span class="queue-list-title">Queue</span>
            <span class="queue-list-summary" id="queue-list-summary">Game / Mod ID / Mod Name / Status / Provider</span>
          </button>
          <div class="queue-list-body">
            <section class="queue-table-wrap" id="queue-table-wrap">
              <table id="queue-table">
                <thead>
                  <tr id="queue-head-row">
                    <th>Game</th>
                    <th>Mod ID</th>
                    <th>Mod Name</th>
                    <th>Status</th>
                    <th>Provider</th>
                  </tr>
                </thead>
                <tbody id="queue-body"></tbody>
              </table>
            </section>
          </div>
        </section>

        <section class="footer-row">
          <button class="control footer-btn" id="open-downloads-btn" type="button">Open Downloads Folder</button>
          <button class="control footer-btn start-btn" id="start-download-btn" type="button">Start Download</button>
          <div id="provider-wrap" class="provider-wrap">
            <div class="provider-select-wrap select-chevron-wrap">
              <span class="provider-display" aria-hidden="true">
                <span class="provider-display-prefix">Provider:</span>
                <span class="provider-display-name" id="provider-display-name">Default</span>
              </span>
              <select class="control provider-select" id="provider" name="provider" aria-label="Provider">
                <option value="Default">Default</option>
                <option value="SteamCMD">SteamCMD</option>
                <option value="SteamWebAPI">SteamWebAPI</option>
              </select>
            </div>
          </div>
        </section>

        <section id="log-wrap" class="log-wrap">
          <div class="log-area">
            <button id="log-copy-btn" class="log-tool-btn hidden-log-tool" type="button" title="Copy visible logs">Copy</button>
            <button id="log-clear-btn" class="log-tool-btn danger hidden-log-tool" type="button" title="Clear logs">Clear</button>
            <div class="log-feed" id="event-log" role="log" aria-live="polite"></div>
          </div>
        </section>
      </section>

      <section class="app-tab-panel placeholder-panel hidden" data-app-panel="update">
        <div class="placeholder-card">
          <div>
            <h2>Update</h2>
            <p>Mod update management will be added here.</p>
          </div>
          <button class="control action-btn" type="button" disabled>Coming Soon</button>
        </div>
      </section>
    </div>
    <div id="window-resize-east" class="window-resize-edge east"></div>
    <div id="window-resize-south" class="window-resize-edge south"></div>
  </div>
  <div id="queue-context-menu" class="queue-context-menu hidden">
    <button class="queue-context-item" data-action="move_top" type="button">Move to Top</button>
    <button class="queue-context-item" data-action="move_up" type="button">Move Up</button>
    <button class="queue-context-item" data-action="move_down" type="button">Move Down</button>
    <button class="queue-context-item" data-action="move_bottom" type="button">Move to Bottom</button>
    <div class="queue-context-sep"></div>
    <div class="queue-context-submenu">
      <button class="queue-context-parent" type="button">Provider</button>
      <div class="queue-context-subpopup">
        <button class="queue-context-item" data-action="provider_default" type="button">Default</button>
        <button class="queue-context-item" data-action="provider_steamcmd" type="button">SteamCMD</button>
        <button class="queue-context-item" data-action="provider_webapi" type="button">SteamWebAPI</button>
      </div>
    </div>
    <button class="queue-context-item" data-action="override_appid" type="button">Override AppID</button>
    <button class="queue-context-item" data-action="reset_status" type="button">Reset Status</button>
    <div class="queue-context-sep"></div>
    <button class="queue-context-item danger" data-action="remove" type="button">Remove</button>
  </div>
  <div id="logs-context-menu" class="queue-context-menu hidden">
    <div class="queue-context-submenu">
      <button class="queue-context-parent" type="button">Category</button>
      <div class="queue-context-subpopup">
        <button class="queue-context-item" data-action="set_log_category" data-log-category="all" type="button">All</button>
        <button class="queue-context-item" data-action="set_log_category" data-log-category="ui" type="button">UI</button>
        <button class="queue-context-item" data-action="set_log_category" data-log-category="system" type="button">System</button>
        <button class="queue-context-item" data-action="set_log_category" data-log-category="queue" type="button">Queue</button>
        <button class="queue-context-item" data-action="set_log_category" data-log-category="download" type="button">Download</button>
        <button class="queue-context-item" data-action="set_log_category" data-log-category="clipboard" type="button">Clipboard</button>
        <button class="queue-context-item" data-action="set_log_category" data-log-category="debug" type="button">Debug</button>
      </div>
    </div>
    <div class="queue-context-sep"></div>
    <button class="queue-context-item" data-action="clear_logs" type="button">Clear Logs</button>
  </div>
  <div id="header-context-menu" class="header-context-menu hidden"></div>
  <div id="command-palette-overlay" class="command-palette-overlay hidden">
    <section class="command-palette-card" role="dialog" aria-modal="true" aria-label="Command Palette">
      <div id="command-palette-filters" class="command-palette-filters" aria-label="Command filters">
        <div id="command-palette-filter-tabs" class="command-palette-filter-tabs" role="tablist" aria-label="Command filters"></div>
        <button id="command-palette-filter-menu-btn" class="command-palette-filter-menu-btn" type="button" title="Edit Command Filters" aria-label="Edit Command Filters">
          <img src="../filter.svg" alt="">
        </button>
      </div>
      <div class="command-palette-input-row">
        <input
          id="command-palette-input"
          class="command-palette-input"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="Type a command..."
        >
        <span class="command-palette-hint">Esc</span>
      </div>
      <div id="command-palette-list" class="command-palette-list"></div>
    </section>
  </div>
  <div id="command-palette-filter-menu" class="header-context-menu hidden"></div>
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-card">
      <h3 id="modal-title" class="modal-title">Dialog</h3>
      <p id="modal-message" class="modal-message"></p>
      <div id="modal-form" class="modal-form hidden"></div>
      <textarea id="modal-input" class="modal-input" rows="8"></textarea>
      <div class="modal-actions">
        <button id="modal-cancel-btn" class="control modal-btn" type="button">Cancel</button>
        <button id="modal-ok-btn" class="control modal-btn primary" type="button">OK</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
